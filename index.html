<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,interactive-widget=resizes-content"/>
<title>ZaiqaPlan</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23E85D2C'/><text y='.9em' font-size='72' x='50%' text-anchor='middle' dominant-baseline='hanging' dy='10'>🫕</text></svg>"/>
<link rel="alternate icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAB9SURBVFhH7ZaxCsAgDET9/6/OVgqFkr2kN2TJB3HxHjEZRERERER+A3hm5u4OAAAAAAD8R2ZuZmZmIiIiIiIiIsuyLAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAqBcAAP//"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23E85D2C'/><text y='.9em' font-size='72' x='50%' text-anchor='middle' dominant-baseline='hanging' dy='10'>🫕</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --or:#E85D2C;--orl:#F4825A;--orp:#FEE8DF;--ord:#C44A1E;
  --sa:#6B8C6E;--sap:#EBF2EC;--sal:#9BB89E;
  --cr:#FAF6F0;--crd:#F0E8DC;--crdd:#E5D9CC;
  --br:#3D2C1E;--brm:#7A5C42;--brl:#A8836A;
  --wh:#FFFFFF;
  --red:#DC2626;--redp:#FEE2E2;
  --blue:#2563EB;--bluep:#EFF6FF;
  --amber:#D97706;--amberp:#FEF3C7;
  --purple:#7C3AED;--purplep:#EDE9FE;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--cr);color:var(--br);}
h1,h2,h3,h4{font-family:'Playfair Display',serif;}

/* ══ SPLASH ══ */
#splash{position:fixed;inset:0;z-index:999;background:var(--or);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease,transform .5s ease;}
#splash.hide{opacity:0;transform:scale(1.06);pointer-events:none;}
.sp-icon{width:120px;height:120px;border-radius:32px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:66px;margin-bottom:28px;box-shadow:0 12px 48px rgba(0,0,0,.18);animation:spPop .7s cubic-bezier(.34,1.56,.64,1) both;}
.sp-title{font-family:'Playfair Display',serif;font-size:40px;color:#fff;letter-spacing:-.5px;animation:spUp .5s ease .25s both;}
.sp-sub{font-size:13px;color:rgba(255,255,255,.72);margin-top:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;animation:spUp .5s ease .38s both;}
.sp-dots{display:flex;gap:8px;margin-top:52px;animation:spUp .4s ease .5s both;}
.sdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);animation:sdP 1.3s ease infinite;}
.sdot:nth-child(2){animation-delay:.22s;}.sdot:nth-child(3){animation-delay:.44s;}
@keyframes spPop{from{opacity:0;transform:scale(.3) rotate(-20deg)}to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes spUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes sdP{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

/* ══ APP ROOT ══ */
#app{position:fixed;inset:0;overflow:hidden;display:flex;flex-direction:column;}

/* ══ AUTH ══ */
.auth-wrap{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--cr);}
.auth-hero{background:var(--or);padding:calc(40px + 24px) 28px 48px;display:flex;flex-direction:column;align-items:center;text-align:center;}
.auth-app-icon{width:84px;height:84px;border-radius:22px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:46px;margin-bottom:16px;box-shadow:0 6px 28px rgba(0,0,0,.14);}
.auth-title{font-family:'Playfair Display',serif;font-size:32px;color:#fff;margin-bottom:5px;}
.auth-tag{font-size:13px;color:rgba(255,255,255,.7);font-weight:600;letter-spacing:.05em;}
.auth-body{padding:28px 22px calc(80px + env(safe-area-inset-bottom,0px));}
.auth-seg{display:flex;background:var(--crd);border-radius:12px;padding:4px;margin-bottom:22px;}
.auth-seg-btn{flex:1;padding:9px;text-align:center;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;color:var(--brm);border:none;background:none;transition:all .15s;}
.auth-seg-btn.on{background:var(--wh);color:var(--br);box-shadow:0 1px 6px rgba(61,44,30,.1);}
.auth-divider{display:flex;align-items:center;gap:10px;margin:20px 0;color:var(--brl);font-size:11px;font-weight:700;letter-spacing:.06em;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--crd);}
.auth-admin-row{text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--crd);}

/* ══ FORM ══ */
.inp{width:100%;padding:13px 14px;border:1.5px solid var(--crd);border-radius:10px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;color:var(--br);background:var(--cr);outline:none;display:block;-webkit-appearance:none;appearance:none;transition:border-color .15s;margin-bottom:10px;}
.inp:focus{border-color:var(--or);}
.inp:last-of-type{margin-bottom:0;}
textarea.inp{resize:vertical;min-height:100px;line-height:1.5;}
select.inp{cursor:pointer;}
.lbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--brm);display:block;margin-bottom:6px;margin-top:14px;}
.lbl:first-child{margin-top:0;}
.ferr{font-size:12px;color:var(--red);font-weight:600;padding:9px 12px;background:var(--redp);border-radius:8px;margin-top:8px;}
.fok{font-size:13px;color:#166534;font-weight:600;padding:12px 14px;background:#dcfce7;border:1px solid #86efac;border-radius:10px;margin-top:8px;line-height:1.5;}

/* ══ BUTTONS ══ */
.btn-p{background:var(--or);color:#fff;border:none;border-radius:12px;padding:14px 20px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;width:100%;box-shadow:0 4px 16px rgba(232,93,44,.25);display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;margin-top:14px;}
.btn-p:disabled{opacity:.45;}
.btn-p:active{opacity:.82;}
.btn-ghost{background:none;border:1.5px solid var(--crd);color:var(--brm);border-radius:10px;padding:11px 16px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;}
.btn-ghost:active{background:var(--cr);}
.btn-red{background:var(--red);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.btn-blue{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.btn-sage{background:var(--sa);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.text-btn{background:none;border:none;color:var(--or);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;padding:0;}
.link-btn{background:none;border:none;color:var(--brm);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;padding:0;text-decoration:underline;}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:#25D366;color:#fff;border:none;border-radius:12px;padding:13px 20px;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;text-decoration:none;margin-top:10px;width:100%;cursor:pointer;}

/* ══ ADMIN SHELL ══ */
.adm-shell{display:flex;flex-direction:column;height:100%;background:#1E120A;}
.adm-topbar{padding:calc(40px + 10px) 18px 12px;background:linear-gradient(160deg,#2A1D12,#1E120A);border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.adm-topbar-row{display:flex;align-items:center;justify-content:space-between;}
.adm-logo{display:flex;align-items:center;gap:10px;}
.adm-logo-icon{width:36px;height:36px;border-radius:10px;background:var(--or);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.adm-logo-title{font-family:'Playfair Display',serif;font-size:19px;color:#fff;line-height:1;}
.adm-logo-sub{font-size:10px;color:rgba(255,255,255,.35);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
.adm-logout{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.25);border-radius:8px;padding:7px 14px;color:#FCA5A5;font-size:12px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}

/* Admin tab bar */
.adm-tabs{display:flex;background:rgba(0,0,0,.25);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.adm-tabs::-webkit-scrollbar{display:none;}
.adm-tab{flex-shrink:0;padding:13px 16px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.35);cursor:pointer;border:none;background:none;font-family:'Plus Jakarta Sans',sans-serif;border-bottom:3px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;}
.adm-tab.on{color:var(--orl);border-bottom-color:var(--or);}

.adm-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(24px + env(safe-area-inset-bottom,0px));}

/* Admin cards */
.ac{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin-bottom:12px;}
.ac-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.35);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.ai{width:100%;padding:11px 13px;border:1.5px solid rgba(255,255,255,.1);border-radius:9px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:#fff;background:rgba(255,255,255,.06);outline:none;display:block;-webkit-appearance:none;appearance:none;transition:border-color .15s;margin-bottom:9px;}
.ai:focus{border-color:var(--orl);}
.ai::placeholder{color:rgba(255,255,255,.22);}
.ai option{background:#2A1D12;}
.al{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:rgba(255,255,255,.3);display:block;margin-bottom:5px;margin-top:12px;}
.al:first-child{margin-top:0;}
.a-ok{background:rgba(107,140,110,.18);border:1px solid rgba(107,140,110,.3);color:#9BB89E;padding:9px 12px;border-radius:8px;font-size:12px;font-weight:600;margin-top:10px;}
.a-err{background:rgba(220,38,38,.14);border:1px solid rgba(220,38,38,.28);color:#FCA5A5;padding:9px 12px;border-radius:8px;font-size:12px;font-weight:600;margin-top:10px;}

/* Stat grid */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.sc{border-radius:13px;padding:15px 13px;border:1px solid rgba(255,255,255,.07);}
.sc-icon{font-size:20px;margin-bottom:8px;}
.sc-num{font-family:'Playfair Display',serif;font-size:30px;color:#fff;line-height:1;}
.sc-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.38);margin-top:4px;}
.sc-or{background:rgba(232,93,44,.13);border-color:rgba(232,93,44,.22);}
.sc-gr{background:rgba(107,140,110,.13);border-color:rgba(107,140,110,.22);}
.sc-bl{background:rgba(37,99,235,.13);border-color:rgba(37,99,235,.2);}
.sc-am{background:rgba(217,119,6,.13);border-color:rgba(217,119,6,.2);}

/* Admin rows */
.a-dish-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.a-dish-row:last-child{border-bottom:none;}
.a-dish-name{flex:1;font-size:14px;font-weight:500;color:rgba(255,255,255,.82);}
.a-dish-cat{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.04em;margin-right:8px;white-space:nowrap;}
.a-btns{display:flex;gap:5px;}
.a-user-row{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.a-user-row:last-child{border-bottom:none;}
.a-user-email{font-size:13px;font-weight:600;color:rgba(255,255,255,.82);}
.a-user-meta{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px;}
.a-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;}
.a-badge-g{background:rgba(107,140,110,.22);color:#9BB89E;}
.a-badge-r{background:rgba(220,38,38,.18);color:#FCA5A5;}

/* Edit overlay */
.eo{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.ebox{width:100%;max-width:360px;background:#2A1D12;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:22px;animation:spUp .2s ease;}
.ebox-title{font-family:'Playfair Display',serif;font-size:18px;color:#fff;margin-bottom:16px;}

/* ══ USER APP SHELL ══ */
.app-shell{display:flex;flex-direction:column;height:100%;}
.app-hdr-wrap{flex-shrink:0;background:var(--or);}
.hdr{padding:calc(32px + 10px) 18px 12px;background:var(--or);display:flex;align-items:center;justify-content:space-between;}
.hdr-brand{font-family:'Playfair Display',serif;font-size:22px;line-height:1;color:#fff;}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.7);font-weight:500;margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-hi{font-size:13px;color:rgba(255,255,255,.9);font-weight:600;background:rgba(255,255,255,.18);padding:5px 12px;border-radius:20px;}
.hdr-link{background:none;border:none;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;padding:0;}
.hdr-sep{color:rgba(255,255,255,.3);font-size:14px;}
.main-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.tab-bar{background:var(--wh);border-top:1px solid var(--crd);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -4px 20px rgba(61,44,30,.07);flex-shrink:0;}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 0 7px;font-size:9px;font-weight:700;letter-spacing:.05em;color:var(--brm);cursor:pointer;border:none;background:none;text-transform:uppercase;font-family:'Plus Jakarta Sans',sans-serif;gap:3px;transition:color .15s;}
.tab-btn.on{color:var(--or);}
.tab-btn svg path,.tab-btn svg circle,.tab-btn svg rect,.tab-btn svg line{transition:stroke .15s, fill .15s;}

/* ══ USER CONTENT ══ */
.ca{padding:16px 16px calc(80px + env(safe-area-inset-bottom,0px));}
.card{background:var(--wh);border-radius:14px;box-shadow:0 2px 12px rgba(61,44,30,.07);overflow:hidden;}
.dish-row{display:flex;align-items:center;padding:12px 15px;border-bottom:1px solid var(--cr);}
.dish-row:last-child{border-bottom:none;}
.cb{width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid var(--crdd);display:flex;align-items:center;justify-content:center;margin-right:11px;cursor:pointer;flex-shrink:0;background:var(--wh);}
.cb.on{background:var(--sa);border-color:var(--sa);}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;display:inline-block;margin-top:3px;}
.cat-meat{background:#FEE8DF;color:#C0440D;}.cat-chicken{background:#FFF4E0;color:#B07A00;}.cat-veg{background:var(--sap);color:var(--sa);}.cat-sea{background:#E0F0FA;color:#1A6FA0;}.cat-def{background:var(--crd);color:var(--brm);}
.fab{position:fixed;bottom:calc(65px + env(safe-area-inset-bottom,0px) + 14px);right:18px;width:54px;height:54px;border-radius:16px;background:var(--or);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(232,93,44,.45);border:none;cursor:pointer;z-index:15;font-size:27px;line-height:1;}
.day-card{background:var(--wh);border-radius:14px;overflow:hidden;margin-bottom:12px;box-shadow:0 2px 12px rgba(61,44,30,.06);}
.day-hdr{background:var(--or);padding:10px 15px;display:flex;align-items:center;justify-content:space-between;}
.meal-slot{background:var(--cr);border-radius:10px;padding:11px 13px;margin-bottom:7px;}
.meal-slot:last-child{margin-bottom:0;}
.meal-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--brm);margin-bottom:3px;}
.meal-name{font-size:14px;font-weight:600;}
.shuf-btn{background:rgba(255,255,255,.22);border:none;border-radius:7px;padding:4px 11px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
.gen-btn{background:var(--or);color:#fff;border:none;border-radius:11px;padding:9px 16px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;box-shadow:0 3px 12px rgba(232,93,44,.25);}
.gen-btn:disabled{opacity:.45;}
.del-btn{background:none;border:none;cursor:pointer;padding:4px 7px;color:var(--or);font-size:16px;flex-shrink:0;}
.pill-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;}
.pill-row::-webkit-scrollbar{display:none;}
.fpill{flex-shrink:0;padding:5px 13px;border-radius:20px;border:1.5px solid var(--crd);background:var(--wh);color:var(--brm);font-size:12px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}
.fpill.on{border-color:var(--or);background:var(--orp);color:var(--or);}
.share-pre{margin:0;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;line-height:1.8;color:var(--br);white-space:pre-wrap;word-break:break-word;}
.empty{text-align:center;padding:50px 24px;color:var(--brm);}
.empty-icon{font-size:44px;margin-bottom:12px;}
.row-bet{display:flex;align-items:center;justify-content:space-between;}
.sec-title{font-size:18px;margin-bottom:2px;}
.sec-sub{font-size:13px;color:var(--brm);}

/* ══ BOTTOM SHEET ══ */
.overlay{position:fixed;inset:0;background:rgba(61,44,30,.5);z-index:100;display:flex;align-items:flex-end;}
.sheet{width:100%;background:var(--wh);border-radius:22px 22px 0 0;padding:22px 20px calc(28px + env(safe-area-inset-bottom,0px));animation:shUp .22s ease;max-height:92vh;overflow-y:auto;}
@keyframes shUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.drag{width:38px;height:4px;background:#E0D8D0;border-radius:4px;margin:0 auto 20px;}

/* ══ GROCERY ══ */
.groc-item{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--cr);gap:10px;}
.groc-item:last-child{border-bottom:none;}
.groc-item.done .groc-name{text-decoration:line-through;opacity:.45;}
.groc-cb{width:22px;height:22px;min-width:22px;border-radius:50%;border:2px solid var(--crdd);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;background:var(--wh);}
.groc-cb.on{background:var(--sa);border-color:var(--sa);}
.groc-name{flex:1;font-size:14px;font-weight:600;}
.groc-qty{font-size:12px;color:var(--brm);font-weight:600;white-space:nowrap;}
.groc-actions{display:flex;gap:4px;}
.groc-share-box{background:var(--cr);border:1.5px solid var(--crd);border-radius:12px;padding:14px;margin-bottom:14px;}
.groc-cats-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.groc-cat-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}

/* ══ SETTINGS ══ */
.sett-section{background:var(--wh);border-radius:14px;box-shadow:0 2px 12px rgba(61,44,30,.07);overflow:hidden;margin-bottom:14px;}
.sett-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--cr);}
.sett-row:last-child{border-bottom:none;}
.sett-label{font-size:14px;font-weight:600;}
.sett-val{font-size:13px;color:var(--brm);}
.sett-danger{background:var(--redp);border-radius:14px;overflow:hidden;margin-bottom:14px;}

/* ══ SUPABASE REST ══ */
function getServiceKey(){return S.supaServiceKey||S.supaKey;}
function sbH(svc){
  var tok=svc?getServiceKey():(S.session&&S.session.access_token?S.session.access_token:S.supaKey);
  var apiKey=svc?getServiceKey():S.supaKey;
  return {'apikey':apiKey,'Authorization':'Bearer '+tok,'Content-Type':'application/json','Accept':'application/json'};
}
async function sbFetch(path,opts,svc){
  var r=await fetch(S.supaUrl+path,Object.assign({headers:sbH(svc)},opts||{}));
  var txt=await r.text();var j;try{j=JSON.parse(txt);}catch(x){j=txt;}
  if(!r.ok){
    var msg='HTTP '+r.status;
    if(j&&typeof j==='object'){
      msg=j.message||j.error_description||j.error||j.msg||j.hint||JSON.stringify(j);
    }else if(typeof j==='string'&&j.length){
      msg=j;
    }
    // Make common Supabase errors human-readable
    if(msg.indexOf('User already registered')>-1) msg='An account with this email already exists. Please sign in.';
    else if(msg.indexOf('Invalid login credentials')>-1) msg='Incorrect email or password.';
    else if(msg.indexOf('Email not confirmed')>-1) msg='Please confirm your email first — check your inbox.';
    else if(msg.indexOf('Password should be')>-1) msg='Password must be at least 6 characters.';
    else if(msg.indexOf('Unable to validate email')>-1) msg='Please enter a valid email address.';
    else if(msg.indexOf('rate limit')>-1||msg.indexOf('too many')>-1||msg.indexOf('429')>-1) msg='Too many attempts — please wait a few minutes and try again.';
    throw new Error(msg);
  }
  return j;
}

/* ══ DOM BUILDER ══ */
function el(tag,attrs,children){
  var n=document.createElement(tag);
  (attrs?Object.keys(attrs):[]).forEach(function(k){
    if(k==='className')n.className=attrs[k];
    else if(k==='style'&&typeof attrs[k]==='object')Object.assign(n.style,attrs[k]);
    else if(k.startsWith('on')&&typeof attrs[k]==='function')n.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else if(k==='disabled')n.disabled=attrs[k];
    else if(k==='href')n.href=attrs[k];
    else if(k==='target')n.target=attrs[k];
    else if(k==='type')n.type=attrs[k];
    else if(k==='placeholder')n.placeholder=attrs[k];
    else if(k==='rows')n.rows=attrs[k];
    else if(k!=='key')try{n.setAttribute(k,attrs[k]);}catch(x){}
  });
  (children||[]).forEach(function(c){if(c===null||c===undefined||c===false)return;n.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);});
  return n;
}
function sv(tag,a,ch){var n=document.createElementNS('http://www.w3.org/2000/svg',tag);(a?Object.keys(a):[]).forEach(function(k){n.setAttribute(k,a[k]);});(ch||[]).forEach(function(c){n.appendChild(c);});return n;}

/* ══════════════════════════════════════════
   AUTH SCREEN
   ══════════════════════════════════════════ */
function renderAuth(){
  // ── FORGOT PASSWORD FLOW ──
  if(S.forgotMode){
    if(S.forgotStep===2) return renderForgotStep2();
    return renderForgotStep1();
  }

  var isLogin=S.authMode==='login';

  function doAuth(){
    S.authErr='';S.authOk='';
    if(S.authBusy)return;
    if(!S.authEmail.trim()||!S.authPass.trim()){S.authErr='Please fill in all fields';render();return;}
    if(!isLogin&&!S.authName.trim()){S.authErr='Please enter your name';render();return;}
    if(!isLogin&&S.authPass.length<6){S.authErr='Password must be at least 6 characters';render();return;}
    S.authBusy=true;render();
    if(isLogin){
      authSignIn(S.authEmail.trim(),S.authPass).then(function(res){
        if(res.error)throw new Error(typeof res.error==='object'?(res.error.message||res.error.error_description||JSON.stringify(res.error)):String(res.error));
        S.session=res;localStorage.setItem(SK.sess,JSON.stringify(res));
        S.authEmail='';S.authPass='';S.authName='';S.authErr='';S.authOk='';S.authBusy=false;
        S.view='app';render();loadDishes();
      }).catch(function(e){S.authBusy=false;S.authErr=e.message||'Sign in failed';render();});
    } else {
    authSignUp(S.authEmail.trim(),S.authPass,S.authName.trim()).then(function(res){
        if(res.error)throw new Error(typeof res.error==='object'?(res.error.message||res.error.error_description||JSON.stringify(res.error)):String(res.error));

        // Case 1: email confirmations OFF — got access_token immediately, log straight in
        if(res.access_token){
          S.session=res;localStorage.setItem(SK.sess,JSON.stringify(res));
          S.authEmail='';S.authPass='';S.authName='';S.authConfPass='';
          S.authErr='';S.authOk='';S.authBusy=false;
          S.view='app';render();loadDishes();
          return;
        }

        // Case 2: email confirmations ON — user created but needs to confirm
        // Supabase returns {user: {..., email_confirmed_at: null}, session: null}
        if(res.user&&res.user.id){
          S.authBusy=false;
          S.authPass='';S.authName='';
          S.authOk='📧 Account created! We sent a confirmation email to '+S.authEmail.trim()+'. Please click the link in the email to verify your account, then sign in here.';
          S.authMode='login';
          render();
          return;
        }

        // Fallback
        S.authBusy=false;
        S.authOk='📧 Account created! Please check your email to confirm, then sign in.';
        S.authMode='login';render();
      }).catch(function(e){S.authBusy=false;S.authErr=e.message||'Sign up failed';render();});
    }
  }

  var body=[
    el('div',{className:'auth-seg'},[
      el('button',{className:'auth-seg-btn'+(isLogin?' on':''),onClick:function(){S.authMode='login';S.authErr='';S.authOk='';render();}},['Sign In']),

async function loadAdminStats(){
  S.adminStatBusy=true;patchAdminBody();
  try{
    var md=await dbGet('master_dishes')||[];
    // Fetch user_dishes with service key to bypass RLS and count all users' dishes
    var ud=[];
    try{ ud=await sbFetch('/rest/v1/user_dishes?select=id',{},true)||[]; }
    catch(x){ try{ ud=await dbGet('user_dishes')||[]; }catch(x2){} }
    var users=[];
    if(S.supaServiceKey){
      var usersRes=await adminGetUsers().catch(function(){return null;});
      users=(usersRes&&usersRes.users)||[];
    }
    S.adminStats={
      master:md.length, userDishes:ud.length,
      users:users.length, hasServiceKey:!!S.supaServiceKey,
      newWeek:users.filter(function(u){return u.created_at&&(Date.now()-new Date(u.created_at))<7*864e5;}).length,
    };
  }catch(e){S.adminStats={master:0,userDishes:0,users:0,hasServiceKey:!!S.supaServiceKey,newWeek:0};}
  S.adminStatBusy=false;patchAdminBody();
}
async function loadAdminDishes(){
  S.adminDishBusy=true;patchAdminBody();
  try{S.adminDishes=await dbGet('master_dishes')||[];}
  catch(e){showToast('Load error: '+e.message);}
  S.adminDishBusy=false;patchAdminBody();
}
async function loadAdminUsers(){
  S.adminUserBusy=true;patchAdminBody();
  // Try admin API first (needs service_role key), fall back to anon-accessible data
  try{
    var r=await adminGetUsers();
    S.adminUsers=(r&&r.users)||[];
    S.adminUsersViaAdmin=true;
  }catch(e){
    // anon key can't access /auth/v1/admin/users — try to get user stats from user_dishes table
    S.adminUsers=[];
    S.adminUsersViaAdmin=false;
    showToast('Note: Full user list needs service_role key');
  }
  S.adminUserBusy=false;patchAdminBody();
}

async function loadAdminUserDishes(){
  S.adminUserDishBusy=true;patchAdminBody();

    // Use service key to fetch ALL users' dishes, bypassing RLS
    S.adminUserDishes=await sbFetch('/rest/v1/user_dishes?select=*&order=created_at.desc',{},true)||[];

function renderAdminCategories(){
  if(S.adminCatBusy) return el('div',{style:{display:'flex',justifyContent:'center',padding:'40px'}},[el('div',{className:'a-spin'})]);
  var ni=el('input',{className:'ai',placeholder:'e.g. Desserts',onInput:function(e){S.adminAddCatName=e.target.value;},onKeyDown:function(e){if(e.key==='Enter')doAddCat();}});
  ni.value=S.adminAddCatName||'';
  var addBtn=el('button',{className:'btn-p'},['+ Add Category']);
  var allCatsInUse=BASE_CATS.slice();
  S.adminCats.forEach(function(c){if(allCatsInUse.indexOf(c.name)===-1)allCatsInUse.push(c.name);});

  async function doAddCat(){
    var name=(ni.value||'').trim();
    if(!name){showToast('Enter a category name');return;}
    var allExisting=allCatsInUse.map(function(c){return c.toLowerCase();});
    if(allExisting.indexOf(name.toLowerCase())>-1){showToast('Category already exists');return;}
    addBtn.disabled=true;
    while(addBtn.firstChild)addBtn.removeChild(addBtn.firstChild);
    addBtn.appendChild(el('span',{className:'spin'}));
    try{
      var rows=await dbInsert('dish_categories',{name:name});
      var row=(rows&&rows[0])||{id:Date.now(),name:name};
      S.adminCats.push(row);S.adminAddCatName='';ni.value='';
      showToast('Category "'+name+'" added ✓');patchAdminBody();
    }catch(e){
      addBtn.disabled=false;
      while(addBtn.firstChild)addBtn.removeChild(addBtn.firstChild);
      addBtn.appendChild(document.createTextNode('+ Add Category'));
      if(e.message&&(e.message.indexOf('42P01')>-1||e.message.indexOf('does not exist')>-1)){

  return el('div',null,[

      el('div',{className:'ac-title'},[
        '🏷️ All Categories ('+allCatsInUse.length+')',

      ]),
      el('div',null,allCatsInUse.map(function(name){

          el('span',{className:'a-dish-name'},[name]),

            ?el('span',{style:{fontSize:'10px',fontWeight:'700',padding:'2px 8px',borderRadius:'20px',background:'rgba(107,140,110,.18)',color:'#9BB89E',textTransform:'uppercase',marginRight:'6px'}},['Built-in'])
            :el('span',{style:{fontSize:'10px',fontWeight:'700',padding:'2px 8px',borderRadius:'20px',background:'rgba(232,93,44,.15)',color:'var(--orl)',textTransform:'uppercase',marginRight:'6px'}},['Custom']),
          (!isBase&&customEntry)?el('button',{className:'btn-red',onClick:async function(){
            if(!confirm('Delete "'+name+'"?'))return;

            catch(e2){showToast('Error: '+e2.message);}

      el('div',{style:{fontSize:'12px',color:'rgba(255,255,255,.35)',marginBottom:'8px'}},[

/* Admin tab renderer */
function renderAdminBody(){
  if(S.adminTab==='overview')   return renderAdminOverview();
  if(S.adminTab==='config')     return renderAdminConfig();
  if(S.adminTab==='dishes')     return renderAdminDishes();
  if(S.adminTab==='userdishes') return renderAdminUserDishes();
  if(S.adminTab==='categories') return renderAdminCategories();
  if(S.adminTab==='users')      return renderAdminUsers();
  return el('div',null,[]);
}

function patchAdminBody(){
  var ab=document.getElementById('adm-body');
  if(!ab)return;
  while(ab.firstChild)ab.removeChild(ab.firstChild);
  ab.appendChild(renderAdminBody());
  // Fix select values
  var sels=ab.querySelectorAll('select.ai');
  sels.forEach(function(s){if(s.dataset.val)s.value=s.dataset.val;});
  // Update tab underlines - find tabs in the actual DOM tab bar
  document.querySelectorAll('.adm-tab').forEach(function(t){
    var isOn=t.dataset.tab===S.adminTab;
    t.className='adm-tab'+(isOn?' on':'');
  });
  // Edit overlay
  var eo=document.getElementById('edit-overlay');if(!eo&&S.adminEditDish){var ne=renderEditOverlay();document.getElementById('app').appendChild(ne);}
  if(eo&&!S.adminEditDish)eo.remove();
}

/* ── SCHEDULE ── */
function smartGenerate(pool){
  // RULES:
  // 1. Never repeat a dish when pool >= 14 (enough for all 14 slots)
  // 2. When pool < 14, spread dishes as evenly as possible — each dish used
  //    ceil(14/n) times max, cycling through a fresh shuffle each pass
  // 3. Lunch and dinner on the same day must always be different dishes
  // 4. Meat/Chicken: max 1 appearance across the whole week

  var HEAVY = ['meat','chicken'];
  function isHeavy(cat){ return !!cat && HEAVY.indexOf(cat.toLowerCase()) > -1; }

  var n = pool.length;

  // ── Step 1: build a 14-item ordered bag with no repeats within each pass ──
  // Each "pass" is a full shuffle of the pool. We take passes until we have 14.
  var bag = [];
  while(bag.length < 14){
    var pass = shuffle(pool.slice()); // fresh shuffle every pass
    for(var i = 0; i < pass.length && bag.length < 14; i++){
      bag.push(pass[i]);
    }
  }
  // bag now has exactly 14 items, with dishes spread as evenly as possible

  // ── Step 2: enforce max 1 heavy dish across the whole week ──
  // Find all heavy positions and keep only the first one; replace the rest
  // with light dishes already in the bag (swap them out)
  var heavyPositions = [];
  for(var i = 0; i < bag.length; i++){
    if(isHeavy(bag[i].category)) heavyPositions.push(i);
  }
  // Keep first heavy, replace the rest with a non-heavy from the same pass
  var lightPool = pool.filter(function(d){ return !isHeavy(d.category); });
  for(var h = 1; h < heavyPositions.length; h++){
    // Find a light dish not already adjacent in bag to swap in
    var pos = heavyPositions[h];
    var replacement = null;
    var shuffledLight = shuffle(lightPool.slice());
    for(var l = 0; l < shuffledLight.length; l++){
      // Prefer one not already at pos-1 or pos+1
      var candidate = shuffledLight[l];
      var neighborIds = [
        pos > 0 ? bag[pos-1].id : null,
        pos < 13 ? bag[pos+1].id : null
      ];
      if(neighborIds.indexOf(candidate.id) === -1){
        replacement = candidate; break;
      }
    }
    if(!replacement && shuffledLight.length) replacement = shuffledLight[0];
    if(replacement) bag[pos] = replacement;
  }

  // ── Step 3: assign bag to 7 days, fixing same-day lunch==dinner conflicts ──
  var week = [];
  for(var day = 0; day < 7; day++){
    var lunch  = bag[day * 2];
    var dinner = bag[day * 2 + 1];

    // If they're the same dish, find the nearest different dish to swap dinner with
    if(lunch.id === dinner.id){
      // Look ahead/behind in the bag for a swap candidate
      var swapped = false;
      for(var offset = 1; offset < bag.length && !swapped; offset++){
        var candidate = bag[(day * 2 + 1 + offset) % bag.length];
        if(candidate.id !== lunch.id){
          // Swap dinner slot with this candidate
          var tmp = bag[day * 2 + 1];
          bag[day * 2 + 1] = candidate;
          bag[(day * 2 + 1 + offset) % bag.length] = tmp;
          dinner = bag[day * 2 + 1];
          swapped = true;
        }
      }
    }

    week.push({ lunch: lunch, dinner: dinner });
  }

  return week;
}

      el('h2',{style:{fontSize:'20px',marginBottom:'18px'}},['Edit Item']),
      el('label',{className:'lbl',style:{marginTop:'0'}},['Item Name']),ni,
      el('label',{className:'lbl'},['Quantity']),qi,
      el('label',{className:'lbl'},['Unit']),us,
      el('label',{className:'lbl'},['Price (Rs) — optional']),pi,
      el('div',{style:{display:'flex',gap:'8px',marginTop:'14px'}},[
        el('button',{className:'btn-p',style:{marginTop:'0',flex:'1'},onClick:doSave},['Save']),
        el('button',{className:'btn-ghost',style:{flex:'1'},onClick:function(){S.grocEditItem=null;patchMainContent();}},['Cancel'])
      ])
    ])
  ]);
}

/* ── SETTINGS ── */
function renderSettings(){
  var u=S.session&&S.session.user;
  var currEmail=u&&u.email||'';
  var currName=u&&u.user_metadata&&u.user_metadata.full_name||'';
  if(!S.settEmail&&currEmail)S.settEmail=currEmail;
  if(!S.settName&&currName)S.settName=currName;

  var ni=el('input',{className:'inp',placeholder:'Full name',onInput:function(e){S.settName=e.target.value;}});
  ni.value=S.settName;
  var ei=el('input',{className:'inp',type:'email',placeholder:'Email address',onInput:function(e){S.settEmail=e.target.value;}});
  ei.value=S.settEmail;
  var pi=el('input',{className:'inp',type:'password',placeholder:'New password (leave blank to keep)',onInput:function(e){S.settNewPass=e.target.value;}});
  pi.value='';

  async function saveSettings(){
    S.settErr='';S.settOk='';
    var updates={};
    if(S.settName.trim()&&S.settName.trim()!==currName) updates.data={full_name:S.settName.trim()};
    if(S.settEmail.trim()&&S.settEmail.trim()!==currEmail) updates.email=S.settEmail.trim();
    if(S.settNewPass.trim()){
      if(S.settNewPass.trim().length<6){S.settErr='New password must be at least 6 characters';patchMainContent();return;}
      updates.password=S.settNewPass.trim();
    }
    if(!Object.keys(updates).length){S.settOk='Nothing to update';patchMainContent();return;}
    S.settBusy=true;patchMainContent();
    try{
      await authUpdateUser(updates);
      S.settOk='✓ Profile updated!';S.settNewPass='';
      if(updates.data&&S.session&&S.session.user&&S.session.user.user_metadata){
        S.session.user.user_metadata.full_name=S.settName.trim();
        localStorage.setItem(SK.sess,JSON.stringify(S.session));
      }
    }catch(e){S.settErr='Error: '+e.message;}
    S.settBusy=false;patchMainContent();
  }

  // Feedback section
  var fta=el('textarea',{className:'inp',rows:6,placeholder:'Describe your suggestion or problem (up to 500 characters)…',
    onInput:function(e){
      var v=e.target.value;if(v.length>500)v=v.substring(0,500);
      S.feedbackText=v;e.target.value=v;
      var cnt=document.getElementById('fb-count');if(cnt)cnt.textContent=v.length+'/500';
      var btn=document.getElementById('fb-btn');if(btn)btn.disabled=!v.trim();
    }});
  fta.value=S.feedbackText;
  fta.style.resize='vertical';fta.style.minHeight='120px';fta.style.marginBottom='4px';

  async function sendFeedback(){
    var txt=fta.value.trim();
    if(!txt)return;
    S.feedbackBusy=true;S.feedbackOk='';S.feedbackErr='';
    var btn=document.getElementById('fb-btn');
    if(btn){btn.disabled=true;while(btn.firstChild)btn.removeChild(btn.firstChild);btn.appendChild(el('span',{className:'spin'}));}
    try{
      // Use mailto as universal solution — works on mobile APK too
      var subject='ZaiqaPlan Feedback from '+(currEmail||'User');
      var body='From: '+(currName||'User')+' <'+(currEmail||'unknown')+'>\n\n'+txt;
      var mailto='mailto:shanawar.rapidflow+support@gmail.com?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);
      window.location.href=mailto;
      S.feedbackText='';fta.value='';
      S.feedbackOk='✓ Opening email app to send your message!';
    }catch(e){S.feedbackErr='Could not open email: '+e.message;}
    S.feedbackBusy=false;
    if(btn){btn.disabled=!fta.value.trim();while(btn.firstChild)btn.removeChild(btn.firstChild);btn.appendChild(document.createTextNode('Send Feedback'));}
    var m=document.getElementById('fb-msg');
    if(m){m.textContent=S.feedbackOk||S.feedbackErr;m.style.display=(S.feedbackOk||S.feedbackErr)?'block':'none';m.className=S.feedbackOk?'fok':'ferr';}
  }

  var fbBtn=el('button',{id:'fb-btn',className:'btn-p',disabled:!S.feedbackText.trim(),onClick:sendFeedback},['Send Feedback']);

  return el('div',{className:'ca'},[
    el('div',{className:'sec-title',style:{marginBottom:'16px'}},['Settings']),

    // Current info
    el('div',{className:'sett-section'},[
      el('div',{className:'sett-row'},[el('span',{className:'sett-label'},['Email']),el('span',{className:'sett-val'},[currEmail])]),
      el('div',{className:'sett-row'},[el('span',{className:'sett-label'},['Name']),el('span',{className:'sett-val'},[currName||'—'])]),
    ]),

    // Update profile
    el('div',{style:{background:'var(--wh)',borderRadius:'14px',boxShadow:'0 2px 12px rgba(61,44,30,.07)',padding:'16px',marginBottom:'14px'}},[
      el('div',{style:{fontWeight:'700',fontSize:'14px',marginBottom:'14px',color:'var(--br)'}},['Update Profile']),
      el('label',{className:'lbl',style:{marginTop:'0'}},['Full Name']),ni,
      el('label',{className:'lbl'},['Email Address']),ei,
      el('label',{className:'lbl'},['New Password']),pi,
      S.settOk?el('div',{className:'fok',style:{marginTop:'10px'}},[S.settOk]):null,
      S.settErr?el('div',{className:'ferr',style:{marginTop:'10px'}},[S.settErr]):null,
      el('button',{className:'btn-p',disabled:S.settBusy,onClick:saveSettings},[S.settBusy?el('span',{className:'spin'}):'Save Changes'])
    ]),

    // Feedback
    el('div',{style:{background:'var(--wh)',borderRadius:'14px',boxShadow:'0 2px 12px rgba(61,44,30,.07)',padding:'16px',marginBottom:'14px'}},[
      el('div',{style:{fontWeight:'700',fontSize:'14px',marginBottom:'4px',color:'var(--br)'}},['💬 Suggestions or Problems']),
      el('p',{style:{fontSize:'13px',color:'var(--brm)',marginBottom:'12px'}},['Tell us what you think — we read every message.']),
      el('label',{className:'lbl',style:{marginTop:'0'}},['Your Message']),
      fta,
      el('div',{style:{textAlign:'right',fontSize:'11px',color:'var(--brm)',marginBottom:'8px'},id:'fb-count'},[S.feedbackText.length+'/500']),
      el('div',{id:'fb-msg',style:{display:(S.feedbackOk||S.feedbackErr)?'block':'none'},className:S.feedbackOk?'fok':'ferr'},[S.feedbackOk||S.feedbackErr]),
      fbBtn
    ]),

    // Sign out
    el('div',{style:{background:'var(--redp)',borderRadius:'14px',padding:'16px',marginBottom:'14px'}},[
      el('div',{style:{fontWeight:'700',fontSize:'14px',marginBottom:'8px',color:'var(--red)'}},['Sign Out']),
      el('button',{className:'btn-red',style:{width:'100%',padding:'12px',fontSize:'14px',borderRadius:'10px'},onClick:async function(){
        if(!confirm('Sign out?'))return;
        await authSignOut();S.view='auth';S.dishes=[];S.week=null;S.tab='schedule';render();
      }},['Sign Out'])
    ])
  ]);
}

/* ── ADD DISH MODAL ── */
function renderAddDishModal(){
  var ni=el('input',{className:'inp',placeholder:'e.g. Daal Makhani',onInput:function(e){S.addDishName=e.target.value;},onKeyDown:function(e){if(e.key==='Enter')doAdd();}});
  ni.value=S.addDishName;
  setTimeout(function(){ni.focus();},80);
  var cs=el('select',{className:'inp',style:{marginBottom:'0'},onChange:function(e){S.addDishCat=e.target.value;}},getAddCats().map(function(c){return el('option',{value:c},[c]);}));
  setTimeout(function(){cs.value=S.addDishCat;},0);
  var addBtn=el('button',{className:'btn-p'},['Add Dish']);

  async function doAdd(){
    var name=ni.value.trim(), cat=cs.value;
    if(!name){showToast('Enter a dish name');return;}
    // Duplicate check
    var dup=S.dishes.find(function(d){return (d.name||d.dish_name||'').toLowerCase()===name.toLowerCase();});
    if(dup){showToast('⚠️ "'+name+'" already exists!');return;}
    // Disable button in-place — do NOT call patchMainContent (it destroys this modal)
    addBtn.disabled=true;
    while(addBtn.firstChild)addBtn.removeChild(addBtn.firstChild);
    addBtn.appendChild(el('span',{className:'spin'}));
    var uid=S.session&&S.session.user?S.session.user.id:null;
    try{
      var rows=await userInsert('user_dishes',{dish_name:name,dish_category:cat,is_active:true,user_id:uid});
      var row=rows&&rows[0]?rows[0]:{id:Date.now(),dish_name:name,dish_category:cat,is_active:true};
      row._s='u';S.dishes.push(row);
      S.addDishName='';S.showAddDish=false;
      showToast('Dish added ✓');
      patchMainContent(); // re-render now that modal should close
    }catch(e){
      showToast('Error: '+e.message);
      addBtn.disabled=false;
      while(addBtn.firstChild)addBtn.removeChild(addBtn.firstChild);
      addBtn.appendChild(document.createTextNode('Add Dish'));
    }
  }

  addBtn.addEventListener('click',doAdd);

  return el('div',{className:'overlay',onClick:function(e){if(e.target.classList.contains('overlay')){S.showAddDish=false;patchMainContent();}}},[
    el('div',{className:'sheet'},[
      el('div',{className:'drag'}),
      el('h2',{style:{fontSize:'20px',marginBottom:'18px'}},['Add Your Dish']),
      el('label',{className:'lbl',style:{marginTop:'0'}},['Dish Name']),ni,
      el('label',{className:'lbl'},['Category']),cs,
      addBtn
    ])
  ]);
}

/* ══ MAIN RENDER ══ */
function render(){
  var app=document.getElementById('app');while(app.firstChild)app.removeChild(app.firstChild);
  if(S.view==='admin-login'){app.appendChild(renderAdminLogin());}
  else if(S.view==='admin'){app.appendChild(renderAdmin());renderToast();}
  else if(S.view==='auth'){app.appendChild(renderAuth());}
  else if(S.view==='app'){app.appendChild(renderApp());patchMainContent();}
  renderToast();
}

/* ── KEYBOARD / SHEET FIX ── */
// Use visualViewport to detect keyboard and push overlay above it
(function(){
  function onViewportChange(){
    var vv = window.visualViewport;
    if(!vv) return;
    var kbHeight = window.innerHeight - vv.height - vv.offsetTop;
    if(kbHeight < 50) kbHeight = 0;
    // Move all overlays up by keyboard height
    document.querySelectorAll('.overlay').forEach(function(ov){
      ov.style.bottom = kbHeight + 'px';
      ov.style.top = '0';
      ov.style.height = (window.innerHeight - kbHeight) + 'px';
    });
    // Move admin edit overlay content up
    document.querySelectorAll('.eo').forEach(function(eo){
      eo.style.paddingBottom = (kbHeight + 20) + 'px';
    });
    // Scroll focused input into view in sheet
    var focused = document.activeElement;
    if(focused && (focused.tagName==='INPUT'||focused.tagName==='TEXTAREA'||focused.tagName==='SELECT')){
      setTimeout(function(){
        focused.scrollIntoView({behavior:'smooth', block:'center'});
      }, 50);
    }
  }
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', onViewportChange);
    window.visualViewport.addEventListener('scroll', onViewportChange);
  }
  // Also handle focus events for auth page and non-overlay inputs
  document.addEventListener('focus', function(e){
    var el = e.target;
    if(el && (el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.tagName==='SELECT')){
      setTimeout(function(){ el.scrollIntoView({behavior:'smooth', block:'center'}); }, 400);
    }
  }, true);
})();

/* ══ INIT ══ */
function init(){
  // Check if Supabase redirected back after email confirmation
  // URL hash will contain #access_token=...&type=signup or type=recovery
  var hash=window.location.hash;
  if(hash&&hash.indexOf('access_token')>-1){
    var params={};
    hash.replace('#','').split('&').forEach(function(p){var kv=p.split('=');params[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||'');});
    if(params.access_token){
      var type=params.type||'';
      // Clean URL hash immediately
      history.replaceState(null,'',window.location.pathname);
      // Hide splash fast
      var sp=document.getElementById('splash');
      if(sp){sp.classList.add('hide');setTimeout(function(){sp.style.display='none';},520);}

      if(type==='recovery'){
        // Password reset link — go to reset password screen
        S.session={access_token:params.access_token,refresh_token:params.refresh_token||'',token_type:'bearer'};
        localStorage.setItem(SK.sess,JSON.stringify(S.session));
        S.view='auth';S.forgotMode=true;S.forgotStep=2;render();
        return;
      }

      // type === 'signup' or 'email_change' — email confirmed, log them in
      sbFetch('/auth/v1/user',{headers:{'apikey':S.supaKey,'Authorization':'Bearer '+params.access_token}}).then(function(user){
        var sess={access_token:params.access_token,refresh_token:params.refresh_token||'',token_type:'bearer',user:user};
        S.session=sess;localStorage.setItem(SK.sess,JSON.stringify(sess));
        // Show confirmation success then go to app
        S.view='auth';
        S.authOk='✅ Email confirmed! You are now signed in.';
        S.authMode='login';
        render();
        // Auto-proceed to app after short delay
        setTimeout(function(){
          S.authOk='';S.view='app';render();loadDishes();
        },2000);
      }).catch(function(){
        history.replaceState(null,'',window.location.pathname);
        S.view='auth';
        S.authOk='✅ Email confirmed! Please sign in.';
        S.authMode='login';
        render();
      });
      return;
    }
  }

  setTimeout(function(){
    var sp=document.getElementById('splash');
    if(sp){sp.classList.add('hide');setTimeout(function(){sp.style.display='none';},520);}
    if(S.session&&S.session.access_token){S.view='app';render();loadDishes();}
    else{S.view='auth';render();}
  },2200);
}

// Run immediately — no event listener needed since this script is at end of body
// Also hook events as backup for different WebView environments
var _initDone=false;
function _safeInit(){if(_initDone)return;_initDone=true;init();}

// Immediate call — works when script runs after DOM is ready
_safeInit();

// Backups in case DOM wasn't ready yet
document.addEventListener('DOMContentLoaded',_safeInit);
window.addEventListener('load',_safeInit);
</script>
